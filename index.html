<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Doação de caes</title>
</head>

<body>

    <header> Formulario </header>

    <main>
        <form id="Formulario">
            <label> Email: </label>
            <input type="text" id="email" required>

            <label>Nome:</label>
            <input type="text" id="nome" required>

            <label>Telefone:</label>
            <input type="tel" id="telefone" required>

            <label>CPF:</label>
            <input type="text" id="cpf" required>

            <label>Idade:</label>
            <input type="number" id="Idade" required>

            <label>Cidade:</label>
            <input type="text" id="text" required>

            <label>Tipo de moradia</label>
            <select id="moradia" required>
                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="apártamento">Apartamento</option>
            </select>

            <div id="apartamentodiv" style="display: none;">
                <label>Permite animais</label>
                <select id="permicao">
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>

            <div id="casadiv" style="display: none;">
                <label> Possue quintal</label>
                <select id="quintal">
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>

            </div>


            <div id="quintaldiv" style="display: none;">

                <label>O quintal é seguro</label>
                <select id="quintalseg">
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>

            <label>Ja teve pet:</label>
            <select id="jateve">
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>

            <label>Quanto tempo o pet ficará sozinho:</label>
            <input type="number" id="hora" required>

            <label>Condição financeira</label>
            <select id="financeiro" required>
                <option value="">Selecione</option>
                <option value="boa">Boa</option>
                <option value="ruim">Ruim</option>
            </select>

            <label>Quando decidiu adotar</label>
            <select id="decisao" required>
                <option value="">Selecione</option>
                <option value="hoje">Hoje</option>
                <option value="tempo">Faz tempo</option>
            </select>

            <label>Motivo</label>
            <textarea id="mensagem" minlength="10" rows="4" cols="50" required placeholder="Min 10 caracteres"
                style="resize: none;"></textarea>

            <label>
                <input type="checkbox" id="termo" required>
                Aceito os <a href="termos.html" target="_blank">Termos de responsabilidade</a>
            </label>

            <button type="submit">Enviar</button>



        </form>
    </main>

</body>

</html>
